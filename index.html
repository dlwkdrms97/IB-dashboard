<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아이-온 (I-ON) | 마음을 켜다</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#fff7ed', 100: '#ffedd5', 500: '#f97316', 600: '#ea580c' },
                    },
                    borderRadius: { '4xl': '2rem', '5xl': '3rem' }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #fdf6f0; transition: all 0.5s; overflow-x: hidden; }
        .dark body { background-color: #0a0a0a; color: #f1f5f9; }
        .title-font { font-family: 'Gaegu', cursive; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass { background: rgba(31, 31, 31, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-orange { background: linear-gradient(135deg, #f97316 0%, #fb923c 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input:focus, select:focus, textarea:focus { ring: 3px; ring-color: #f97316; }
        .bento-card { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; }
        .bento-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="min-h-screen no-scrollbar">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const supabaseClient = supabase.createClient('https://uylrclocdtkninhctmit.supabase.co', 'sb_publishable_346goY9EGGBHKdBR2IaNmg_Zh8qWfaZ');

        const SUBJECTS = ['국어', '수학', '사회', '과학', '영어', '역사', '도덕', '체육', '음악', '미술', '보건', '진로와직업', '기술가정'];
        const NEULPUM_SUBJECTS = ['국어', '수학', '사회', '진로와직업', '언어치료'];
        const MATH_NURI_SUBJECTS = ['수학'];
        const PERIODS = ['1교시', '2교시', '3교시', '4교시', '5교시', '6교시', '7교시'];
        const IB_PROFILES = [
            { id: 'inquirer', name: '지식 탐구자', icon: '🔍' },
            { id: 'knowledgeable', name: '지식 있는 사람', icon: '📚' },
            { id: 'thinker', name: '생각하는 사람', icon: '💡' },
            { id: 'communicator', name: '소통하는 사람', icon: '🗣️' },
            { id: 'principled', name: '원칙을 지키는 사람', icon: '⚖️' },
            { id: 'open-minded', name: '열린 마음을 가진 사람', icon: '🌍' },
            { id: 'caring', name: '배려하는 사람', icon: '❤️' },
            { id: 'risk-taker', name: '도전하는 사람', icon: '🚀' },
            { id: 'balanced', name: '균형 있는 사람', icon: '⚖️' },
            { id: 'reflective', name: '성찰하는 사람', icon: '🧘' }
        ];

        const App = () => {
            const [view, setView] = useState('intro');
            const [userInfo, setUserInfo] = useState(JSON.parse(localStorage.getItem('ion_user')));
            const [darkMode, setDarkMode] = useState(localStorage.getItem('ion_dark') === 'true');
            const [showRecords, setShowRecords] = useState(false);
            const [records, setRecords] = useState([]);
            
            // Manage current school date (local system time)
            const getLocalDate = () => {
                const now = new Date();
                const kst = new Date(now.getTime() + (9 * 60 * 60 * 1000));
                return kst.toISOString().split('T')[0];
            };
            const [sessionDate, setSessionDate] = useState(getLocalDate());

            const isNeulpum = userInfo?.userClass?.includes('늘품');
            const isMathNuri = userInfo?.userClass?.includes('수학누리');
            const currentSubjects = isNeulpum ? NEULPUM_SUBJECTS : (isMathNuri ? MATH_NURI_SUBJECTS : SUBJECTS);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', darkMode);
                localStorage.setItem('ion_dark', darkMode);
            }, [darkMode]);

            useEffect(() => {
                if (userInfo) setView('main');
            }, []);

            const handleLogin = (data) => {
                const info = { userName: data.user_name, userClass: data.user_class, userNumber: data.user_number };
                setUserInfo(info);
                localStorage.setItem('ion_user', JSON.stringify(info));
                setView('main');
            };

            const handleLogout = () => {
                localStorage.removeItem('ion_user');
                setUserInfo(null);
                setView('intro');
            };

            const fetchRecords = async () => {
                if(!userInfo) return;
                const { data } = await supabaseClient.from('reflect_record').select('*').eq('user_name', userInfo.userName).order('created_at', { ascending: false });
                setRecords(data || []);
                setShowRecords(true);
            };

            const Header = () => (
                <header className="p-6 md:p-10 flex justify-between items-center sticky top-0 z-40 w-full max-w-5xl mx-auto">
                    <div className="flex items-center gap-3">
                        <img src="logo.png" alt="로고" className="w-12 h-12 object-contain" />
                        <div>
                            <div className="flex items-center gap-2">
                                <h1 className="text-xl font-black tracking-tighter dark:text-white uppercase italic">I-ON</h1>
                                <span className="px-2 py-0.5 rounded-full bg-brand-100 text-brand-600 text-[10px] font-black">{sessionDate}</span>
                            </div>
                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest leading-none">마음을 켜고(ON), 따뜻한(溫) 교실</p>
                        </div>
                    </div>
                    <div className="flex items-center gap-3">
                        {userInfo && <button onClick={fetchRecords} className="px-4 py-2 rounded-2xl glass text-xs font-black">기록 📖</button>}
                        <button onClick={() => setDarkMode(!darkMode)} className="w-10 h-10 rounded-2xl glass flex items-center justify-center text-lg">{darkMode ? '☀️' : '🌙'}</button>
                    </div>
                </header>
            );

            const Intro = () => {
                const [form, setForm] = useState({ grade: '', classNum: '', num: '', name: '', pin: '' });
                const [loading, setLoading] = useState(false);
                return (
                    <div className="flex-grow flex flex-col items-center justify-center p-6 space-y-10 animate-in fade-in zoom-in">
                        <div className="text-center space-y-2">
                            <h2 className="text-5xl font-black title-font text-brand-500">반가워요!</h2>
                            <p className="text-gray-400 font-medium italic">본인의 정보를 입력하여 접속해 주세요.</p>
                        </div>
                        <div className="w-full max-w-sm space-y-4">
                            <div className="grid grid-cols-2 gap-3">
                                {form.classNum !== '수학누리' ? (
                                    <select onChange={e=>setForm({...form, grade:e.target.value})} className="p-4 rounded-3xl glass outline-none font-bold text-center">
                                        <option value="">학년</option><option value="1">1학년</option><option value="2">2학년</option><option value="3">3학년</option>
                                    </select>
                                ) : (
                                    <div className="p-4 rounded-3xl glass font-bold text-center text-gray-400 opacity-50 select-none">학년 없음</div>
                                )}
                                <select onChange={e=>setForm({...form, classNum:e.target.value})} className="p-4 rounded-3xl glass outline-none font-bold text-center">
                                    <option value="">반</option><option value="1">1반</option><option value="2">2반</option><option value="늘품">늘품반</option><option value="수학누리">수학누리반</option>
                                </select>
                            </div>
                            <div className="grid grid-cols-3 gap-3">
                                <input type="number" placeholder="번호" value={form.num} onChange={e=>setForm({...form, num:e.target.value})} className="col-span-1 p-4 rounded-3xl glass outline-none font-bold text-center" />
                                <input type="text" placeholder="이름 입력" value={form.name} onChange={e=>setForm({...form, name:e.target.value})} className="col-span-2 p-4 rounded-3xl glass outline-none font-bold text-center" />
                            </div>
                            <input type="password" placeholder="PIN 번호 (4자리)" value={form.pin} onChange={e=>setForm({...form, pin:e.target.value})} className="w-full p-5 rounded-3xl glass outline-none font-bold text-center text-2xl tracking-[0.5em]" />
                            <button onClick={async () => {
                                const isMathNuriForm = form.classNum === '수학누리';
                                if((!isMathNuriForm && !form.grade) || !form.classNum || !form.num || !form.name || !form.pin) return alert('모든 정보를 입력해주세요.');
                                setLoading(true);
                                const userClass = isMathNuriForm ? '수학누리' : `${form.grade}-${form.classNum}`;
                                const { data, error } = await supabaseClient
                                    .from('student_info')
                                    .select('*')
                                    .eq('user_class', userClass)
                                    .eq('user_number', form.num)
                                    .eq('user_name', form.name)
                                    .eq('pin', form.pin)
                                    .single();
                                
                                if(data) handleLogin(data);
                                else alert('정보가 일치하는 학생이 없습니다.');
                                setLoading(false);
                            }} className="w-full py-5 rounded-[2.5rem] bg-brand-500 text-white font-black text-xl shadow-xl shadow-orange-100 dark:shadow-none hover:bg-brand-600 transition-all">
                                {loading ? '인증 중...' : '입장하기 🚀'}
                            </button>
                        </div>
                    </div>
                );
            };

            const Main = () => (
                <div className="flex-grow flex flex-col items-center justify-center p-6 w-full max-w-5xl mx-auto space-y-12 animate-in fade-in">
                    <div className="w-full text-left px-4">
                        <p className="text-brand-500 font-black mb-1">{userInfo.userClass} {userInfo.userNumber}번</p>
                        <h2 className="text-4xl font-black dark:text-white leading-tight">{userInfo.userName} 학생, 반가워요!<br/>오늘의 아이-온을 시작해볼까요?</h2>
                    </div>
                    <div className={`grid grid-cols-1 md:grid-cols-2 ${isNeulpum ? 'lg:grid-cols-5' : 'lg:grid-cols-4'} gap-6 w-full`}>
                        {[
                            { id: 'morning', title: 'Morning ON', sub: '아침 체크인', icon: '🌅', color: 'bg-blue-500' },
                            { id: 'class', title: 'Class ON', sub: '수업 준비', icon: '🎒', color: 'bg-teal-500' },
                            ...(isNeulpum ? [{ id: 'goal', title: 'Goal ON', sub: '나의 배움목표', icon: '🎯', color: 'bg-orange-500' }] : []),
                            { id: 'reflect', title: 'Reflect ON', sub: '배움 성찰', icon: '✨', color: 'bg-purple-500' },
                            { id: 'heart', title: 'HEART ON', sub: '마음의 편지', icon: '❤️', color: 'bg-red-500' }
                        ].map(m => (
                            <div key={m.id} onClick={()=>setView(m.id)} className="bento-card group glass p-10 rounded-[3rem] flex flex-col items-center text-center space-y-4 hover:border-brand-500 border-2 border-transparent">
                                <div className={`w-20 h-20 ${m.color} rounded-3xl flex items-center justify-center text-4xl shadow-inner group-hover:scale-110 transition-transform`}>{m.icon}</div>
                                <div><h3 className="text-xl font-black dark:text-white">{m.title}</h3><p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">{m.sub}</p></div>
                            </div>
                        ))}
                    </div>
                    <div className="pt-10 flex flex-col items-center gap-6">
                        <button onClick={handleLogout} className="px-10 py-3 rounded-full glass border-2 border-orange-100 dark:border-white/5 text-gray-400 hover:text-red-500 hover:border-red-100 transition-all font-black text-xs flex items-center gap-2 group">
                            <span>로그아웃</span>
                            <span className="group-hover:translate-x-1 transition-transform">🚪</span>
                        </button>
                    </div>
                </div>
            );

            const MorningOn = () => {
                const [temp, setTemp] = useState(3);
                const [step, setStep] = useState(1);
                const [missions, setMissions] = useState([]);
                const [submitting, setSubmitting] = useState(false);
                const missionList = [
                    '선생님과 친구에게 반갑게 인사하기 🤝',
                    '스마트폰 및 스마트 기기 제출하기 📱',
                    '우리반 아침활동 준비하기 📖'
                ];

                const toggleMission = (m) => {
                    setMissions(prev => prev.includes(m) ? prev.filter(x => x !== m) : [...prev, m]);
                };

                return (
                    <div className="flex-grow w-full max-w-2xl mx-auto p-6 flex flex-col justify-center animate-in slide-in-from-bottom-10">
                        <button onClick={()=>setView('main')} className="mb-10 text-gray-400 font-bold">← 돌아가기</button>
                        
                        {step === 1 ? (
                            <div className="glass rounded-[4rem] p-10 md:p-16 space-y-12 text-center border-t-8 border-blue-500 animate-in fade-in">
                                <div className="space-y-2">
                                    <h2 className="text-3xl font-black dark:text-white italic uppercase tracking-tighter">Step 01</h2>
                                    <h3 className="text-2xl font-bold text-gray-400">지금 나의 마음 온도는?</h3>
                                </div>
                                <div className="flex justify-between items-center h-32 px-4">
                                    {[1,2,3,4,5].map(t => (
                                        <button key={t} onClick={()=>setTemp(t)} className={`flex flex-col items-center transition-all ${temp === t ? 'scale-125 opacity-100' : 'opacity-30 blur-[1px]'}`}>
                                            <span className="text-6xl">{['☁️','⛅','☀️','🌈','✨'][t-1]}</span>
                                            <span className={`text-xs font-black mt-2 ${temp===t?'text-blue-500':''}`}>{t}도</span>
                                        </button>
                                    ))}
                                </div>
                                <div className="p-6 bg-blue-50 dark:bg-blue-900/20 rounded-3xl font-bold text-blue-600 dark:text-blue-300">
                                    {['조금 힘들어요. 도움이 필요해요.', '그저 그래요. 힘을 내고 싶어요.', '평범한 아침이에요. 잘 지낼 수 있어요.', '오늘 기분이 좋아요! 신나요.', '최고의 기분이에요! 무엇이든 가능해요!'][temp-1]}
                                </div>
                                <button onClick={()=>setStep(2)} className="w-full py-5 rounded-[2.5rem] bg-blue-500 text-white font-black text-xl shadow-lg hover:bg-blue-600 transition-all">다음으로 ➔</button>
                            </div>
                        ) : (
                            <div className="glass rounded-[4rem] p-10 md:p-16 space-y-10 border-t-8 border-orange-500 animate-in slide-in-from-right-10">
                                <div className="space-y-2 text-center">
                                    <h2 className="text-3xl font-black dark:text-white italic uppercase tracking-tighter">Step 02</h2>
                                    <h3 className="text-2xl font-bold text-gray-400">아침 미션을 완료했나요?</h3>
                                </div>
                                <div className="space-y-4">
                                    {missionList.map((m, i) => (
                                        <div key={i} onClick={()=>toggleMission(m)} className={`p-6 rounded-[2rem] glass border-2 transition-all cursor-pointer flex items-center gap-4 ${missions.includes(m) ? 'border-orange-500 bg-orange-50/50 dark:bg-orange-900/20' : 'border-transparent opacity-60'}`}>
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center font-black ${missions.includes(m) ? 'bg-orange-500 text-white' : 'bg-gray-200 text-gray-400'}`}>
                                                {missions.includes(m) ? '✓' : ''}
                                            </div>
                                            <span className={`font-bold ${missions.includes(m) ? 'text-orange-600 dark:text-orange-400' : 'text-gray-500'}`}>{m}</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={()=>setStep(1)} className="flex-1 py-5 rounded-[2.5rem] glass font-black text-gray-400">이전으로</button>
                                    <button 
                                        disabled={submitting}
                                        onClick={async () => {
                                            setSubmitting(true);
                                            const { error } = await supabaseClient.from('morning_checkin').insert([{ 
                                                user_class: userInfo.userClass, user_number: userInfo.userNumber, user_name: userInfo.userName, 
                                                temp, missions
                                            }]);
                                            setSubmitting(false);
                                            if(!error) { 
                                                alert('미션 완료! 오늘도 멋진 하루 보내세요.'); 
                                                setView('main'); 
                                            } else {
                                                alert('저장 실패: ' + (error.message || '데이터베이스 오류'));
                                            }
                                        }} className={`flex-[2] py-5 rounded-[2.5rem] text-white font-black text-xl shadow-lg transition-all ${submitting ? 'bg-gray-400 scale-95' : 'bg-orange-500 hover:bg-orange-600'}`}>
                                        {submitting ? '처리 중...' : '체크인 완료 ✨'}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const ClassOn = () => {
                const [step, setStep] = useState(isMathNuri ? 2 : 1);
                const [form, setForm] = useState({ 
                    period: isMathNuri ? '수업' : '', 
                    subject: isMathNuri ? '수학' : '', 
                    goal: '' 
                });
                const [submitting, setSubmitting] = useState(false);

                const handleNext = () => {
                    if (!form.period || !form.subject) return alert('교시와 과목을 먼저 선택해 주세요.');
                    setStep(2);
                };

                return (
                    <div className="flex-grow w-full max-w-2xl mx-auto p-6 flex flex-col justify-center animate-in slide-in-from-bottom-10">
                        <button onClick={()=>setView('main')} className="mb-10 text-gray-400 font-bold text-left">← 돌아가기</button>
                        
                        <div className="glass rounded-[4rem] p-10 md:p-16 space-y-8 border-t-8 border-teal-500">
                            <div className="text-center space-y-2">
                                <h2 className="text-3xl font-black dark:text-white uppercase tracking-tighter">Class ON</h2>
                                <p className="text-gray-400 font-bold">{step === 1 ? '먼저 교시와 과목을 골라보세요.' : `${form.period} ${form.subject}의 배움 목표는?`}</p>
                            </div>

                            {step === 1 ? (
                                <div className="space-y-6 animate-in fade-in">
                                    <div className="grid grid-cols-1 gap-4">
                                        <div className="space-y-2">
                                            <p className="text-[10px] font-black text-teal-500 ml-4 uppercase">Step 01. 교시 선택</p>
                                            <div className="flex flex-wrap gap-2">
                                                {PERIODS.map(p => (
                                                    <button key={p} onClick={()=>setForm({...form, period: p})} className={`px-6 py-3 rounded-2xl font-bold transition-all ${form.period === p ? 'bg-teal-500 text-white shadow-lg' : 'glass opacity-60'}`}>{p}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <p className="text-[10px] font-black text-teal-500 ml-4 uppercase">Step 02. 과목 선택</p>
                                            <div className="flex flex-wrap gap-2">
                                                {currentSubjects.map(s => (
                                                    <button key={s} onClick={()=>setForm({...form, subject: s})} className={`px-6 py-3 rounded-2xl font-bold transition-all ${form.subject === s ? 'bg-teal-500 text-white shadow-lg' : 'glass opacity-60'}`}>{s}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={handleNext} className="w-full py-5 rounded-[2.5rem] bg-teal-500 text-white font-black text-xl shadow-lg hover:bg-teal-600 transition-all">다음 단계로 ➔</button>
                                </div>
                            ) : (
                                <div className="space-y-6 animate-in slide-in-from-right-10">
                                    {isNeulpum ? (
                                        <div className="grid grid-cols-2 sm:grid-cols-5 gap-3">
                                            {IB_PROFILES.map(p => (
                                                <button 
                                                    key={p.id} 
                                                    onClick={() => setForm({...form, goal: p.name})}
                                                    className={`p-4 rounded-3xl glass flex flex-col items-center justify-center gap-2 transition-all ${form.goal === p.name ? 'ring-4 ring-brand-500 bg-brand-50 shadow-lg scale-105' : 'hover:bg-white opacity-70'}`}
                                                >
                                                    <span className="text-3xl">{p.icon}</span>
                                                    <span className="text-[10px] font-black break-keep">{p.name}</span>
                                                </button>
                                            ))}
                                        </div>
                                    ) : (
                                        <textarea 
                                            placeholder="오늘 수업에서 무엇을 배우고 싶은지 적어보세요." 
                                            value={form.goal} 
                                            onChange={e=>setForm({...form, goal:e.target.value})} 
                                            className="w-full h-40 p-8 rounded-[3rem] glass outline-none font-medium text-lg focus:ring-4 ring-teal-100" 
                                        />
                                    )}
                                    <div className="flex gap-4">
                                        <button onClick={()=>setStep(1)} className="flex-1 py-5 rounded-[2.5rem] glass font-black text-gray-400">이전으로</button>
                                        <button 
                                            disabled={submitting}
                                            onClick={async () => {
                                                if(!form.goal && !isNeulpum) return alert('배움 목표를 입력해 주세요.');
                                                setSubmitting(true);
                                                const { error } = await supabaseClient.from('class_preparation').insert([{ 
                                                    user_class: userInfo.userClass, 
                                                    user_number: userInfo.userNumber, 
                                                    user_name: userInfo.userName, 
                                                    period: form.period, 
                                                    subject: form.subject,
                                                    subject_name: form.subject, 
                                                    goal: form.goal
                                                }]);
                                                setSubmitting(false);
                                                if(!error) { 
                                                    alert('준비 완료! 멋진 배움 기대할게요.'); 
                                                    setView('main'); 
                                                } else {
                                                    alert('저장 실패: ' + (error.message || '데이터베이스 오류'));
                                                }
                                            }} className={`flex-[2] py-5 rounded-[2.5rem] text-white font-black text-xl shadow-lg transition-all ${submitting ? 'bg-gray-400 scale-95' : 'bg-teal-500 hover:bg-teal-600'}`}>
                                            {submitting ? '처리 중...' : '준비 마침 🎒'}
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const ReflectOn = () => {
                const [step, setStep] = useState(isMathNuri ? 2 : 1);
                const [form, setForm] = useState({ 
                    period: isMathNuri ? '수업' : '', 
                    subject: isMathNuri ? '수학' : '', 
                    rating: 5, 
                    content: '' 
                });
                const [submitting, setSubmitting] = useState(false);

                const handleNext = () => {
                    if (!form.period || !form.subject) return alert('교시와 과목을 먼저 선택해 주세요.');
                    setStep(2);
                };

                return (
                    <div className="flex-grow w-full max-w-2xl mx-auto p-6 flex flex-col justify-center animate-in slide-in-from-bottom-10">
                        <button onClick={()=>setView('main')} className="mb-10 text-gray-400 font-bold text-left">← 돌아가기</button>
                        
                        <div className="glass rounded-[4rem] p-10 md:p-16 space-y-8 border-t-8 border-purple-500">
                            <div className="text-center space-y-2">
                                <h2 className="text-3xl font-black dark:text-white uppercase tracking-tighter">Reflect ON</h2>
                                <p className="text-gray-400 font-bold">{step === 1 ? '어떤 수업을 성찰할까요?' : `${form.period} ${form.subject} 수업은 어땠나요?`}</p>
                            </div>

                            {step === 1 ? (
                                <div className="space-y-6 animate-in fade-in">
                                    <div className="grid grid-cols-1 gap-4">
                                        <div className="space-y-2">
                                            <p className="text-[10px] font-black text-purple-500 ml-4 uppercase">Step 01. 교시 선택</p>
                                            <div className="flex flex-wrap gap-2">
                                                {PERIODS.map(p => (
                                                    <button key={p} onClick={()=>setForm({...form, period: p})} className={`px-6 py-3 rounded-2xl font-bold transition-all ${form.period === p ? 'bg-purple-500 text-white shadow-lg' : 'glass opacity-60'}`}>{p}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <p className="text-[10px] font-black text-purple-500 ml-4 uppercase">Step 02. 과목 선택</p>
                                            <div className="flex flex-wrap gap-2">
                                                {currentSubjects.map(s => (
                                                    <button key={s} onClick={()=>setForm({...form, subject: s})} className={`px-6 py-3 rounded-2xl font-bold transition-all ${form.subject === s ? 'bg-purple-500 text-white shadow-lg' : 'glass opacity-60'}`}>{s}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={handleNext} className="w-full py-5 rounded-[2.5rem] bg-purple-500 text-white font-black text-xl shadow-lg hover:bg-purple-600 transition-all">다음 단계로 ➔</button>
                                </div>
                            ) : (
                                <div className="space-y-8 animate-in slide-in-from-right-10">
                                    <div className="flex flex-col items-center gap-4">
                                        <p className="text-[10px] font-black text-purple-500 uppercase">Step 03. 배움 만족도</p>
                                        <div className="flex justify-center gap-3 text-5xl">
                                            {[1,2,3,4,5].map(r => (
                                                <button key={r} onClick={()=>setForm({...form, rating:r})} className={`transition-all transform ${form.rating >= r ? 'text-yellow-400 scale-110' : 'text-gray-200 scale-90 opacity-50'}`}>★</button>
                                            ))}
                                        </div>
                                        <p className="font-bold text-orange-500">{['매우 아쉬워요', '조금 아쉬워요', '보통이에요', '즐거웠어요', '완벽한 배움이었어요!'][form.rating-1]}</p>
                                    </div>
                                    
                                    <div className="space-y-2">
                                        <p className="text-[10px] font-black text-purple-500 ml-4 uppercase">Step 04. 성찰 내용 작성</p>
                                        <textarea 
                                            placeholder="무엇을 배웠는지, 어떤 점이 좋았는지 한 문장으로 적어보세요." 
                                            value={form.content} 
                                            onChange={e=>setForm({...form, content:e.target.value})} 
                                            className="w-full h-40 p-8 rounded-[3rem] glass outline-none font-medium text-lg focus:ring-4 ring-purple-100" 
                                        />
                                    </div>

                                    <div className="flex gap-4">
                                        <button onClick={()=>setStep(1)} className="flex-1 py-5 rounded-[2.5rem] glass font-black text-gray-400">이전으로</button>
                                        <button 
                                            disabled={submitting}
                                            onClick={async () => {
                                                if(!form.content.trim()) return alert('성찰 내용을 입력해 주세요.');
                                                setSubmitting(true);
                                                const { error } = await supabaseClient.from('reflect_record').insert([{ 
                                                    user_class: userInfo.userClass, 
                                                    user_number: userInfo.userNumber, 
                                                    user_name: userInfo.userName, 
                                                    period: form.period, 
                                                    subject: form.subject, 
                                                    rating: form.rating, 
                                                    content: form.content,
                                                    reflection: `[${form.period} ${form.subject}] ${form.content}`
                                                }]);
                                                setSubmitting(false);
                                                if(!error) { 
                                                    alert('성찰 완료! 소중한 기록이 저장되었습니다.'); 
                                                    setView('main'); 
                                                } else {
                                                    alert('저장 실패: ' + (error.message || '데이터베이스 오류'));
                                                }
                                            }} className={`flex-[2] py-5 rounded-[2.5rem] text-white font-black text-xl shadow-lg transition-all ${submitting ? 'bg-gray-400 scale-95' : 'bg-purple-500 hover:bg-purple-600'}`}>
                                            {submitting ? '처리 중...' : '성찰 기록하기 ✨'}
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const HeartOn = () => {
                const [msg, setMsg] = useState('');
                const [submitting, setSubmitting] = useState(false);
                return (
                    <div className="flex-grow w-full max-w-2xl mx-auto p-6 flex flex-col justify-center animate-in slide-in-from-bottom-10">
                        <button onClick={()=>setView('main')} className="mb-10 text-gray-400 font-bold text-left">← 돌아가기</button>
                        <div className="glass rounded-[4rem] p-10 md:p-16 space-y-8 text-center border-t-8 border-red-500">
                            <h2 className="text-4xl font-black title-font text-red-500">HEART ON ❤️</h2>
                            <p className="text-gray-400 font-medium">선생님께만 전하고 싶은<br/>나의 소중한 이야기를 적어주세요.</p>
                            <textarea value={msg} onChange={e=>setMsg(e.target.value)} placeholder="이곳에 적는 내용은 선생님만 볼 수 있어요." className="w-full h-60 p-8 rounded-[3rem] glass outline-none text-lg font-medium shadow-inner" />
                            <button 
                                disabled={submitting}
                                onClick={async () => {
                                    if(!msg.trim()) return;
                                    setSubmitting(true);
                                    const { error } = await supabaseClient.from('heart_on').insert([{ 
                                        user_class: userInfo.userClass, user_number: userInfo.userNumber, user_name: userInfo.userName, content: msg 
                                    }]);
                                    setSubmitting(false);
                                    if(!error) { 
                                        alert('선생님께 마음이 전달되었습니다.'); 
                                        setView('main'); 
                                    } else {
                                        alert('전송 실패: ' + (error.message || '데이터베이스 오류'));
                                    }
                                }} className={`w-full py-5 rounded-[2.5rem] text-white font-black text-xl shadow-lg transition-all ${submitting ? 'bg-gray-400 scale-95' : 'bg-red-500 hover:bg-red-600'}`}>
                                {submitting ? '전송 중...' : '편지 보내기 💌'}
                            </button>
                        </div>
                    </div>
                );
            };

            const GoalOn = () => {
                const [goal, setGoal] = useState('');
                const [submitting, setSubmitting] = useState(false);

                return (
                    <div className="flex-grow w-full max-w-2xl mx-auto p-6 flex flex-col justify-center animate-in slide-in-from-bottom-10">
                        <button onClick={()=>setView('main')} className="mb-10 text-gray-400 font-bold text-left">← 돌아가기</button>
                        <div className="glass rounded-[4rem] p-10 md:p-16 space-y-8 border-t-8 border-orange-500">
                            <div className="text-center space-y-2">
                                <h2 className="text-3xl font-black dark:text-white italic uppercase tracking-tighter">Goal ON 🎯</h2>
                                <p className="text-gray-400 font-bold">오늘 나의 배움 목표는 무엇인가요?</p>
                            </div>
                            <textarea value={goal} onChange={e=>setGoal(e.target.value)} placeholder="오늘 하루, 내가 이루고 싶은 목표를 자유롭게 적어보세요." className="w-full h-48 p-8 rounded-[3rem] glass outline-none font-medium text-lg focus:ring-4 ring-orange-100 shadow-inner" />
                            <button 
                                disabled={submitting}
                                onClick={async () => {
                                    if(!goal.trim()) return alert('오늘의 목표를 정해볼까요?');
                                    setSubmitting(true);
                                    const { error } = await supabaseClient.from('class_preparation').insert([{ 
                                        user_class: userInfo.userClass, user_number: userInfo.userNumber, user_name: userInfo.userName, 
                                        period: '오늘', subject: '나의 목표', goal: goal
                                    }]);
                                    setSubmitting(false);
                                    if(!error) { 
                                        alert('오늘의 목표 설정 완료! 함께 힘내요.'); 
                                        setView('main'); 
                                    } else {
                                        alert('저장 실패: ' + (error.message || '데이터베이스 오류'));
                                    }
                                }} className={`w-full py-5 rounded-[2.5rem] text-white font-black text-xl shadow-lg transition-all ${submitting ? 'bg-gray-400 scale-95' : 'bg-orange-500 hover:bg-orange-600'}`}>
                                {submitting ? '저장 중...' : '목표 설정하기 🚀'}
                            </button>
                        </div>
                    </div>
                );
            };

            const MyRecords = () => (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-md animate-in fade-in">
                    <div className="w-full max-w-lg glass rounded-[3rem] max-h-[80vh] flex flex-col overflow-hidden shadow-2xl">
                        <div className="p-8 border-b dark:border-white/5 flex justify-between items-center">
                            <h2 className="text-2xl font-black dark:text-white">나의 기록 📖</h2>
                            <button onClick={()=>setShowRecords(false)} className="w-10 h-10 rounded-full bg-gray-100 dark:bg-white/5 flex items-center justify-center font-bold">×</button>
                        </div>
                        <div className="flex-grow overflow-y-auto p-6 space-y-4 no-scrollbar">
                            {records.length === 0 ? <div className="text-center py-20 text-gray-400 font-bold text-lg">아직 성찰 기록이 없어요.</div> : records.map(r => (
                                <div key={r.id} className="p-6 rounded-3xl bg-white dark:bg-white/5 border border-white/20">
                                    <div className="flex justify-between mb-2">
                                        <span className="text-[10px] font-black text-brand-500 uppercase">
                                            {new Date(r.created_at).toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' })}
                                        </span>
                                        <span className="text-yellow-400 text-xs">{'★'.repeat(r.rating)}</span>
                                    </div>
                                    <p className="font-bold mb-1 dark:text-white">[{r.period || '-'} / {r.subject || '-'}]</p>
                                    <p className="text-sm text-gray-500 dark:text-gray-400 leading-relaxed">"{r.content || r.reflection}"</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    {showRecords && <MyRecords />}
                    {view === 'intro' && <Intro />}
                    {view === 'main' && <Main />}
                    {view === 'morning' && <MorningOn />}
                    {view === 'class' && <ClassOn />}
                    {view === 'goal' && <GoalOn />}
                    {view === 'reflect' && <ReflectOn />}
                    {view === 'heart' && <HeartOn />}
                    <footer className="p-10 text-center text-[10px] font-black text-gray-300 dark:text-gray-800 uppercase tracking-[0.5em]">© 2026 I-ON | Sanyang Middle School</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

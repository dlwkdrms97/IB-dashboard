<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IB 학습자 상 & 감정 온도계</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Baloo+2:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-light: #EEEDFE;
    --purple-mid: #7F77DD;
    --purple-dark: #3C3489;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --coral: #D85A30;
    --coral-light: #FAECE7;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --blue: #3B8BEB;
    --blue-light: #E6F1FB;
    --bg: #F7F6FF;
    --card-bg: #FFFFFF;
    --text: #1a1a2e;
    --text-muted: #6b6b8a;
    --border: #e2e0f5;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(100,90,200,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
  }

  /* ── 헤더 ── */
  .header {
    background: linear-gradient(135deg, #534AB7 0%, #7F77DD 60%, #AFA9EC 100%);
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -50px; left: -30px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .header-icon { font-size: 2.5rem; margin-bottom: 0.4rem; }
  .header h1 {
    font-family: 'Baloo 2', 'Noto Sans KR', sans-serif;
    font-size: 1.6rem;
    color: #fff;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 0.25rem;
  }
  .header p { font-size: 0.9rem; color: rgba(255,255,255,0.85); }

  /* ── 이름 입력 ── */
  .name-section {
    max-width: 680px;
    margin: 1.5rem auto 0;
    padding: 0 1rem;
  }
  .name-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    box-shadow: var(--shadow);
  }
  .name-label {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--purple-dark);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .name-input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 1rem;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--purple-mid); }
  .name-input::placeholder { color: #b0aed0; }

  /* ── 진행 상태 ── */
  .progress-section {
    max-width: 680px;
    margin: 1rem auto 0;
    padding: 0 1rem;
    display: flex;
    gap: 10px;
  }
  .prog-pill {
    flex: 1;
    padding: 8px 12px;
    border-radius: 30px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text-muted);
    text-align: center;
    transition: all 0.3s ease;
  }
  .prog-pill.done {
    background: var(--purple-light);
    border-color: var(--purple-mid);
    color: var(--purple-dark);
  }

  /* ── 섹션 ── */
  .section {
    max-width: 680px;
    margin: 1.5rem auto 0;
    padding: 0 1rem;
  }
  .step-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 0.6rem;
  }
  .step-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--purple-mid);
    color: #fff;
    font-size: 0.82rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .step-text { font-size: 0.8rem; font-weight: 500; color: var(--text-muted); }
  .section-title { font-size: 1.15rem; font-weight: 700; color: var(--text); margin-bottom: 0.2rem; }
  .section-sub { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1rem; }

  /* ── 학습자 카드 그리드 ── */
  .learner-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
  }
  .lcard {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 16px 10px 14px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .lcard:hover { border-color: var(--purple-mid); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(127,119,221,0.18); }
  .lcard.selected {
    border-color: var(--purple-mid);
    background: var(--purple-light);
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 24px rgba(127,119,221,0.25);
  }
  .lcard-icon { font-size: 2rem; margin-bottom: 7px; display: block; transition: transform 0.25s cubic-bezier(.34,1.56,.64,1); }
  .lcard.selected .lcard-icon { transform: scale(1.2) rotate(-5deg); }
  .lcard-name { font-size: 0.78rem; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 2px; }
  .lcard.selected .lcard-name { color: var(--purple-dark); }
  .lcard-eng { font-size: 0.68rem; color: var(--text-muted); margin-bottom: 4px; }
  .lcard.selected .lcard-eng { color: var(--purple-mid); }
  .lcard-desc { font-size: 0.68rem; color: var(--text-muted); line-height: 1.4; }
  .lcard.selected .lcard-desc { color: #534AB7; }

  /* ── 감정 버튼 ── */
  .emotion-grid {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .emo-btn {
    flex: 1;
    min-width: 100px;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 14px 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
    background: var(--card-bg);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .emo-btn:hover { transform: translateY(-3px); }
  .emo-btn.selected { transform: translateY(-3px) scale(1.04); }
  .emo-icon { font-size: 2rem; display: block; margin-bottom: 6px; transition: transform 0.25s cubic-bezier(.34,1.56,.64,1); }
  .emo-btn.selected .emo-icon { transform: scale(1.25); }
  .emo-temp { font-size: 0.8rem; font-weight: 700; display: block; margin-bottom: 3px; }
  .emo-words { font-size: 0.68rem; color: var(--text-muted); display: block; line-height: 1.5; white-space: pre-line; }

  /* 감정 색상 */
  .emo-1 { --ec: #3B8BEB; --eb: #E6F1FB; --et: #0C447C; }
  .emo-2 { --ec: #1D9E75; --eb: #E1F5EE; --et: #085041; }
  .emo-3 { --ec: #BA7517; --eb: #FAEEDA; --et: #633806; }
  .emo-4 { --ec: #D85A30; --eb: #FAECE7; --et: #4A1B0C; }
  .emo-5 { --ec: #A32D2D; --eb: #FCEBEB; --et: #501313; }
  .emo-btn.selected { background: var(--eb) !important; border-color: var(--ec) !important; box-shadow: 0 6px 20px color-mix(in srgb, var(--ec) 25%, transparent); }
  .emo-btn.selected .emo-temp { color: var(--et); }
  .emo-btn.selected .emo-words { color: var(--et); opacity: 0.8; }

  /* ── 모달 ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(30,20,80,0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.show {
    opacity: 1;
    pointer-events: all;
  }
  .modal-box {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 2.5rem 2rem 2rem;
    max-width: 460px;
    width: 100%;
    text-align: center;
    border: 2.5px solid var(--purple-mid);
    box-shadow: 0 20px 60px rgba(83,74,183,0.3);
    transform: scale(0.85) translateY(20px);
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    position: relative;
  }
  .modal-overlay.show .modal-box { transform: scale(1) translateY(0); }
  .modal-confetti { font-size: 2.5rem; margin-bottom: 0.75rem; letter-spacing: 6px; animation: bounce 0.6s ease infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-6px); } }
  .modal-learner-icon { font-size: 4rem; margin: 0.5rem 0; }
  .modal-title { font-size: 1.35rem; font-weight: 700; color: var(--text); margin-bottom: 0.75rem; line-height: 1.4; }
  .modal-highlight { color: var(--purple-dark); }
  .modal-body { font-size: 1rem; color: var(--text-muted); line-height: 1.8; margin-bottom: 1.25rem; }
  .modal-emo-bar {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    border-radius: 30px;
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
  }
  .modal-close {
    background: linear-gradient(135deg, var(--purple-mid), var(--purple-dark));
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px 36px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(83,74,183,0.3);
    width: 100%;
  }
  .modal-close:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(83,74,183,0.4); }
  .modal-close:active { transform: scale(0.97); }
  .modal-send {
    background: #1D9E75;
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px 36px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(29,158,117,0.3);
    width: 100%;
    margin-bottom: 10px;
  }
  .modal-send:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(29,158,117,0.4); }
  .modal-send:disabled { background: #aaa; box-shadow: none; cursor: not-allowed; transform: none; }

  /* ── 하단 여백 ── */
  .bottom-pad { height: 3rem; }

  /* ── 반짝임 애니메이션 ── */
  @keyframes sparkle {
    0% { transform: scale(0) rotate(0deg); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
  }
  .spark {
    position: fixed;
    pointer-events: none;
    font-size: 1.2rem;
    animation: sparkle 0.6s ease-out forwards;
    z-index: 9999;
  }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-icon">🌟</div>
  <h1>IB 학습자 상 & 감정 온도계</h1>
  <p>오늘 나는 어떤 배움의 모습으로 시작할까요?</p>
</div>

<!-- 이름 입력 -->
<div class="name-section">
  <div class="name-card">
    <div class="name-label">👤 내 이름</div>
    <input class="name-input" id="nameInput" type="text" placeholder="이름을 입력하세요" maxlength="10" />
  </div>
</div>

<!-- 진행 상태 알약 -->
<div class="progress-section">
  <div class="prog-pill" id="pill1">📋 학습자 상 선택 전</div>
  <div class="prog-pill" id="pill2">🌡️ 감정 온도 선택 전</div>
</div>

<!-- Step 1: 학습자 상 -->
<div class="section">
  <div class="step-label">
    <div class="step-num">1</div>
    <span class="step-text">Step 1</span>
  </div>
  <div class="section-title">IB 학습자 상 선택하기</div>
  <div class="section-sub">오늘 나는 어떤 모습으로 배울까요? 카드를 클릭해 보세요! 🖱️</div>
  <div class="learner-grid" id="learnerGrid"></div>
</div>

<!-- Step 2: 감정 온도계 -->
<div class="section" style="margin-top:1.75rem;">
  <div class="step-label">
    <div class="step-num">2</div>
    <span class="step-text">Step 2</span>
  </div>
  <div class="section-title">감정 온도계</div>
  <div class="section-sub">지금 내 기분은 몇 도인가요? 🌡️</div>
  <div class="emotion-grid" id="emotionGrid"></div>
</div>

<div class="bottom-pad"></div>

<!-- 모달 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-confetti" id="mConfetti">🎉🎊🌟</div>
    <div class="modal-learner-icon" id="mLearnerIcon"></div>
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-emo-bar" id="mEmoBar"></div>
    <button class="modal-send" id="sendBtn" onclick="sendToSheet()">📤 선생님께 전송하기</button>
    <button class="modal-close" onclick="closeModal()">✨ 다시 선택하기</button>
  </div>
</div>

<script>
// ── 데이터 ──────────────────────────────────────────
const LEARNERS = [
  { icon:"🔍", name:"탐구하는 사람",      eng:"Inquirer",      desc:"궁금한 걸 참지 않고 질문해요!" },
  { icon:"📚", name:"지식이 풍부한 사람",  eng:"Knowledgeable", desc:"여러 분야를 깊이 공부해요!" },
  { icon:"💭", name:"생각하는 사람",       eng:"Thinker",       desc:"어려운 문제도 차근차근 생각해요!" },
  { icon:"💬", name:"소통하는 사람",       eng:"Communicator",  desc:"내 생각을 잘 말하고 들어요!" },
  { icon:"🛡️", name:"원칙을 지키는 사람",  eng:"Principled",    desc:"옳고 그름을 알고 바르게 행동해요!" },
  { icon:"🌍", name:"열린 마음을 가진 사람",eng:"Open-minded",   desc:"다른 사람 생각도 존중해요!" },
  { icon:"❤️", name:"배려하는 사람",       eng:"Caring",        desc:"친구와 주변을 따뜻하게 도와요!" },
  { icon:"🎯", name:"도전하는 사람",       eng:"Risk-taker",    desc:"새로운 것도 용감하게 도전해요!" },
  { icon:"⚖️", name:"균형 잡힌 사람",      eng:"Balanced",      desc:"공부, 운동, 쉬기를 골고루 해요!" },
  { icon:"🪞", name:"성찰하는 사람",       eng:"Reflective",    desc:"내가 잘한 것, 더 할 것을 돌아봐요!" }
];

const EMOTIONS = [
  { level:1, icon:"😌", label:"1도", name:"차분해요",      words:"평화로워요\n집중할 수 있어요", bg:"#E6F1FB", border:"#3B8BEB", text:"#0C447C" },
  { level:2, icon:"😊", label:"2도", name:"기분 좋아요",   words:"신나요\n즐거워요",             bg:"#E1F5EE", border:"#1D9E75", text:"#085041" },
  { level:3, icon:"😐", label:"3도", name:"보통이에요",    words:"조금 피곤해요\n졸려요",         bg:"#FAEEDA", border:"#BA7517", text:"#633806" },
  { level:4, icon:"😤", label:"4도", name:"불편해요",      words:"답답해요\n짜증나요",            bg:"#FAECE7", border:"#D85A30", text:"#4A1B0C" },
  { level:5, icon:"😡", label:"5도", name:"많이 힘들어요", words:"화가 나요\n매우 흥분됐어요",     bg:"#FCEBEB", border:"#A32D2D", text:"#501313" }
];

let selLearner = null, selEmotion = null;

// ── Web Audio API 효과음 ─────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();

function playSelect() {
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(440, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(660, AC.currentTime + 0.12);
  g.gain.setValueAtTime(0.18, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.22);
  o.start(); o.stop(AC.currentTime + 0.22);
}

function playSuccess() {
  const notes = [523.25, 659.25, 783.99, 1046.50];
  notes.forEach((freq, i) => {
    const o = AC.createOscillator();
    const g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = 'sine';
    const t = AC.currentTime + i * 0.12;
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    o.start(t); o.stop(t + 0.28);
  });
}

function resumeAC() {
  if (AC.state === 'suspended') AC.resume();
}

// ── 반짝임 파티클 ──────────────────────────────────
function spawnSparks(x, y) {
  const sparks = ['✨','⭐','💫','🌟','✦'];
  for (let i = 0; i < 5; i++) {
    const el = document.createElement('div');
    el.className = 'spark';
    el.textContent = sparks[Math.floor(Math.random() * sparks.length)];
    el.style.left = (x + (Math.random()-0.5)*60) + 'px';
    el.style.top  = (y + (Math.random()-0.5)*60) + 'px';
    el.style.animationDelay = (Math.random()*0.2) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 700);
  }
}

// ── 학습자 카드 렌더링 ──────────────────────────────
const grid = document.getElementById('learnerGrid');
LEARNERS.forEach((l, i) => {
  const card = document.createElement('div');
  card.className = 'lcard';
  card.innerHTML = `
    <span class="lcard-icon">${l.icon}</span>
    <div class="lcard-name">${l.name}</div>
    <div class="lcard-eng">${l.eng}</div>
    <div class="lcard-desc">${l.desc}</div>`;
  card.addEventListener('click', (e) => {
    resumeAC();
    document.querySelectorAll('.lcard').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selLearner = l;
    playSelect();
    const r = card.getBoundingClientRect();
    spawnSparks(r.left + r.width/2, r.top + r.height/2);
    document.getElementById('pill1').textContent = '✅ ' + l.name;
    document.getElementById('pill1').classList.add('done');
    checkBoth();
  });
  grid.appendChild(card);
});

// ── 감정 버튼 렌더링 ───────────────────────────────
const emoGrid = document.getElementById('emotionGrid');
EMOTIONS.forEach((e) => {
  const btn = document.createElement('div');
  btn.className = `emo-btn emo-${e.level}`;
  btn.innerHTML = `
    <span class="emo-icon">${e.icon}</span>
    <span class="emo-temp">${e.label} — ${e.name}</span>
    <span class="emo-words">${e.words}</span>`;
  btn.addEventListener('click', () => {
    resumeAC();
    document.querySelectorAll('.emo-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selEmotion = e;
    playSelect();
    const r = btn.getBoundingClientRect();
    spawnSparks(r.left + r.width/2, r.top + r.height/2);
    document.getElementById('pill2').textContent = '✅ 감정 ' + e.level + '도';
    document.getElementById('pill2').classList.add('done');
    checkBoth();
  });
  emoGrid.appendChild(btn);
});

// ── 두 가지 선택 완료 체크 ─────────────────────────
function checkBoth() {
  if (!selLearner || !selEmotion) return;
  setTimeout(showModal, 400);
}

// ── 모달 표시 ─────────────────────────────────────
function showModal() {
  const name = document.getElementById('nameInput').value.trim() || '학생';
  const confettiMap = { 1:'😌✨💙', 2:'😊🎉💚', 3:'😐💛⭐', 4:'😤🔥💪', 5:'😡💪🌈' };
  const encourageMap = {
    1: "차분하고 집중된 상태네요. 오늘 최고의 수업이 될 거예요!",
    2: "기분이 좋아 보여요! 에너지가 넘치는 수업이 될 거예요!",
    3: "보통인 날도 있어요. 천천히 함께 시작해 봐요!",
    4: "조금 불편한 마음이 있군요. 선생님께 말해도 괜찮아요!",
    5: "많이 힘든가요? 잠깐 숨을 크게 쉬어봐요. 💙"
  };

  document.getElementById('mConfetti').textContent = confettiMap[selEmotion.level];
  document.getElementById('mLearnerIcon').textContent = selLearner.icon;
  document.getElementById('mTitle').innerHTML =
    `오늘 <span class="modal-highlight">${name}</span>학생의 수업 준비 완료! 🎊`;

  document.getElementById('mBody').innerHTML =
    `<strong style="color:#3C3489">${name}</strong>학생은<br>
     오늘 <strong style="color:#534AB7">「${selLearner.name} (${selLearner.eng})」</strong>의 모습으로<br>
     수업에 참여해요!<br><br>
     ${encourageMap[selEmotion.level]}`;

  const bar = document.getElementById('mEmoBar');
  bar.style.background = selEmotion.bg;
  bar.style.color = selEmotion.text;
  bar.style.border = `2px solid ${selEmotion.border}`;
  bar.innerHTML = `${selEmotion.icon} 현재 감정 온도 ${selEmotion.level}도 — ${selEmotion.name}`;

  document.getElementById('modalOverlay').classList.add('show');
  playSuccess();
}


const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyJuHN5l0EJDR_Gz9LzPH5b9bmEyOBASp39amOQ2TaoBGDXR_ELemmUVKgYCx-wCBdr/exec';

async function sendToSheet() {
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 전송 중...';
  const name = document.getElementById('nameInput').value.trim() || '학생';
  const payload = {
    name: name,
    learner: selLearner.name,
    learnerEng: selLearner.eng,
    emotionLevel: selEmotion.level,
    emotionName: selEmotion.name
  };
  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    btn.textContent = '✅ 선생님께 전송 완료!';
    btn.style.background = '#085041';
  } catch(err) {
    btn.textContent = '❌ 전송 실패 - 다시 시도';
    btn.disabled = false;
  }
}

function closeModal() {
  resumeAC();
  document.getElementById('modalOverlay').classList.remove('show');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
